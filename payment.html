<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Bluenose Cleaning Pros</title>
    <link rel="icon" type="image/png" href="blue-vintage-ship.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .step-content { display: none; }
        .step-content.active { display: block; }
        .nav-shadow { box-shadow: 0 2px 15px -3px rgb(0 0 0 / 0.07); }
        .copy-tooltip { display: none; position: absolute; top: -30px; right: 0; background: #020617; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-white/95 backdrop-blur sticky top-0 z-50 nav-shadow h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3">
                <img src="../blue-vintage-ship.png" class="h-10" alt="Bluenose Logo">
                <div>
                    <div class="text-lg font-black text-slate-900 leading-none">Bluenose</div>
                    <div class="text-[8px] uppercase tracking-widest text-sky-600 font-bold">Cleaning Pros</div>
                </div>
            </a>
            <a href="../index.html" class="text-sm font-bold text-sky-600 hover:text-sky-700 transition-colors">← Back</a>
        </div>
    </nav>

    <section class="py-16 px-4">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-10">
                <span class="inline-block px-3 py-1 rounded-full bg-sky-50 text-sky-700 text-[10px] font-black uppercase tracking-widest mb-4">Secure Checkout</span>
                <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Secure Payment</h1>
            </div>

            <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-slate-100">
                
                <div id="step1" class="step-content active">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">1. Enter Details</h2>
                    <div class="space-y-5 mb-8">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Your Name</label>
                            <input type="text" id="custName" placeholder="John Doe" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none font-bold text-slate-700">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Amount Owed (CAD)</label>
                            <input type="number" id="payAmount" placeholder="0.00" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none font-bold text-slate-700">
                        </div>
                    </div>
                    <button type="button" onclick="showInstructions()" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 shadow-lg">Generate Transfer Details →</button>
                </div>

                <div id="step2" class="step-content">
                    <div class="text-center mb-6">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Interac_e-Transfer_logo.svg/1200px-Interac_e-Transfer_logo.svg.png" class="h-6 mx-auto mb-2">
                        <h2 class="text-xl font-black text-slate-900 uppercase tracking-tight">Payment Instructions</h2>
                    </div>

                    <div class="space-y-4 mb-8">
                        <div class="relative bg-slate-50 p-4 rounded-2xl border border-slate-200 cursor-pointer hover:border-sky-300 transition-all" onclick="copyText('akankshasingh@bluenosecleaningpros.ca', 'tipEmail')">
                            <span id="tipEmail" class="copy-tooltip">Copied!</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase block mb-1">Recipient Email</span>
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-slate-900 text-sm">akankshasingh@bluenosecleaningpros.ca</span>
                                <span class="text-sky-600 text-[10px] font-bold">COPY</span>
                            </div>
                        </div>

                        <div class="relative bg-slate-50 p-4 rounded-2xl border border-slate-200 cursor-pointer hover:border-sky-300 transition-all" onclick="copyAmount('tipAmount')">
                            <span id="tipAmount" class="copy-tooltip">Copied!</span>
                            <span class="text-[9px] font-black text-slate-400 uppercase block mb-1">Total Amount</span>
                            <div class="flex justify-between items-center">
                                <span class="font-black text-sky-600 text-xl" id="displayAmount">$0.00</span>
                                <span class="text-sky-600 text-[10px] font-bold">COPY</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-emerald-50 p-4 rounded-2xl mb-8 border border-emerald-100">
                        <p class="text-xs text-emerald-800 font-bold flex items-center gap-2">
                            ✓ Autodeposit Enabled: No security question needed.
                        </p>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="location.reload()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm">Edit</button>
                        <a href="../index.html" class="flex-[2] py-4 bg-slate-900 text-white rounded-xl font-bold text-sm text-center">I've Sent the Transfer</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function showInstructions() {
            const amount = document.getElementById('payAmount').value;
            const name = document.getElementById('custName').value;
            if(!amount || !name) { alert("Enter name and amount"); return; }
            document.getElementById('displayAmount').innerText = "$" + parseFloat(amount).toFixed(2);
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function copyText(text, tooltipId) {
            navigator.clipboard.writeText(text);
            const tip = document.getElementById(tooltipId);
            tip.style.display = 'block';
            setTimeout(() => { tip.style.display = 'none'; }, 2000);
        }

        function copyAmount(tooltipId) {
            const amt = document.getElementById('displayAmount').innerText.replace('$', '');
            navigator.clipboard.writeText(amt);
            const tip = document.getElementById(tooltipId);
            tip.style.display = 'block';
            setTimeout(() => { tip.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
