<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Bluenose Cleaning Pros</title>
    <link rel="icon" type="image/png" href="blue-vintage-ship.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-white h-20 flex items-center border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between">
            <a href="/" class="flex items-center gap-3"><img src="blue-vintage-ship.png" class="h-10"><span class="font-black text-slate-900">Bluenose</span></a>
            <a href="/" class="text-sm font-bold text-sky-600">← Back Home</a>
        </div>
    </nav>

    <section class="py-16 px-4">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-12"><h1 class="text-4xl font-black text-slate-900 mb-2">Request Your Quote</h1><p class="text-slate-500">Fast, local, and reliable cleaning.</p></div>

            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <div id="step1" class="step-content active">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">1. What do you need cleaned?</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <label class="cursor-pointer"><input type="radio" name="service" value="Home" class="peer hidden" checked><div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50">Home</div></label>
                        <label class="cursor-pointer"><input type="radio" name="service" value="Office" class="peer hidden"><div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50">Office</div></label>
                    </div>
                    <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold">Next Step →</button>
                </div>
                <div id="step2" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">2. Tell us about the space</h2>
                    <input type="text" name="address" placeholder="Service Address" class="w-full p-4 bg-slate-50 rounded-xl mb-4" required>
                    <button type="button" onclick="nextStep(3)" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold">Almost Done →</button>
                </div>
                <div id="step3" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">3. Final Details</h2>
                    <input type="text" name="name" placeholder="Your Name" class="w-full p-4 bg-slate-50 rounded-xl mb-4" required>
                    <input type="email" name="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 rounded-xl mb-4" required>
                    <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">Send Request</button>
                </div>
            </form>
        </div>
    </section>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
    </script>
</body>
</html>
