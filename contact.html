<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Bluenose Cleaning Pros</title>
    <link rel="icon" type="image/png" href="blue-vintage-ship.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .step-content { display: none; }
        .step-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-white h-20 flex items-center border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between">
            <a href="/" class="flex items-center gap-3"><img src="blue-vintage-ship.png" class="h-10"><span class="font-black text-slate-900">Bluenose</span></a>
            <a href="/" class="text-sm font-bold text-sky-600">← Back Home</a>
        </div>
    </nav>

    <section class="py-16 px-4">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-black text-slate-900 mb-2">Request Your Quote</h1>
                <p class="text-slate-500">Fast, local, and reliable cleaning across Nova Scotia.</p>
            </div>

            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                
                <div id="step1" class="step-content active">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">1. What do you need cleaned?</h2>
                    <div class="grid grid-cols-1 gap-3 mb-8">
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Residential" class="peer hidden" checked>
                            <div class="p-4 border rounded-2xl text-left px-6 font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 flex justify-between items-center">
                                Residential Cleaning <span>🏠</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Commercial" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-left px-6 font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 flex justify-between items-center">
                                Commercial & Office <span>🏢</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Airbnb" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-left px-6 font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 flex justify-between items-center">
                                Airbnb Turnover <span>🔑</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Deep Clean" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-left px-6 font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 flex justify-between items-center">
                                Deep Cleaning <span>🧼</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Move In-Out" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-left px-6 font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 flex justify-between items-center">
                                Move-In / Move-Out <span>📦</span>
                            </div>
                        </label>
                    </div>
                    <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition-all">Next Step: Location →</button>
                </div>

                <div id="step2" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">2. Tell us about the space</h2>
                    <input type="text" name="address" placeholder="Service Address (Halifax, Bedford, etc.)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:outline-sky-500" required>
                    <textarea name="notes" placeholder="Any special details? (e.g., number of bedrooms, pets, etc.)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 h-32 focus:outline-sky-500"></textarea>
                    
                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(1)" class="w-1/3 py-4 bg-slate-200 text-slate-700 rounded-xl font-bold">Back</button>
                        <button type="button" onclick="nextStep(3)" class="w-2/3 py-4 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition-all">Almost Done →</button>
                    </div>
                </div>

                <div id="step3" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">3. Final Details</h2>
                    <input type="text" name="name" placeholder="Your Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:outline-sky-500" required>
                    <input type="email" name="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-4 focus:outline-sky-500" required>
                    <input type="tel" name="phone" placeholder="Phone Number" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl mb-6 focus:outline-sky-500" required>
                    
                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(2)" class="w-1/3 py-4 bg-slate-200 text-slate-700 rounded-xl font-bold">Back</button>
                        <button type="submit" class="w-2/3 py-4 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition-all">Send Request</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center text-slate-400 text-xs tracking-widest uppercase">
        &copy; 2026 Bluenose Cleaning Pros | Nova Scotia
    </footer>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            window.scrollTo(0, 0); // Scroll to top of form on next step
        }
    </script>
</body>
</html>
