<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote | Bluenose Cleaning Pros</title>
    <link rel="icon" type="image/png" href="blue-vintage-ship.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-white/90 backdrop-blur-md h-20 border-b border-slate-100 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <img src="blue-vintage-ship.png" class="h-10">
                <span class="font-extrabold text-slate-900">Bluenose</span>
            </a>
            <a href="index.html" class="text-sm font-bold text-sky-600">← Back Home</a>
        </div>
    </nav>

    <section class="py-16 px-4">
        <div class="max-w-xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="text-4xl font-black text-slate-900 mb-2">Request Your Quote</h1>
                <p class="text-slate-500">Fast, local, and reliable cleaning in Halifax & Bedford.</p>
            </div>

            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                
                <div id="step1" class="step-content active">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">1. What do you need cleaned?</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Residential" class="peer hidden" checked>
                            <div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 transition-all">Home</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Commercial" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 transition-all">Office</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Airbnb" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 transition-all">Airbnb</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="service" value="Post-Construction" class="peer hidden">
                            <div class="p-4 border rounded-2xl text-center font-bold text-slate-500 peer-checked:border-sky-500 peer-checked:text-sky-600 peer-checked:bg-sky-50 transition-all">Post-Reno</div>
                        </label>
                    </div>
                    <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold shadow-lg shadow-sky-100">Next Step →</button>
                </div>

                <div id="step2" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">2. Tell us about the space</h2>
                    <div class="space-y-4 mb-8">
                        <input type="text" name="address" placeholder="Service Address (e.g., Bedford Highway)" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none" required>
                        <select name="frequency" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none font-medium">
                            <option>One-Time Deep Clean</option>
                            <option>Weekly Service</option>
                            <option>Bi-Weekly Service</option>
                            <option>Monthly Service</option>
                        </select>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(1)" class="w-1/3 py-4 text-slate-400 font-bold">Back</button>
                        <button type="button" onclick="nextStep(3)" class="w-2/3 py-4 bg-sky-600 text-white rounded-xl font-bold shadow-lg shadow-sky-100">Almost Done →</button>
                    </div>
                </div>

                <div id="step3" class="step-content">
                    <h2 class="text-xl font-bold mb-6 text-slate-800 italic">3. Where should we send the quote?</h2>
                    <div class="space-y-4 mb-8">
                        <input type="text" name="name" placeholder="Your Name" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none" required>
                        <input type="email" name="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border-none ring-1 ring-slate-200 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none" required>
                    </div>
                    <div class="flex gap-4">
                        <button type="button" onclick="nextStep(2)" class="w-1/3 py-4 text-slate-400 font-bold">Back</button>
                        <button type="submit" class="w-2/3 py-4 bg-slate-900 text-white rounded-xl font-bold shadow-lg shadow-slate-200">Send Request</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }
    </script>
</body>
</html>
