<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bluenose Cleaning Pros</title>
    <link rel="icon" type="image/png" href="blue-vintage-ship.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="blue-vintage-ship.png" alt="Bluenose Cleaning Pros" class="h-12 w-auto">
                    <div class="leading-none text-nowrap">
                        <span class="block text-xl font-extrabold text-slate-900">Bluenose</span>
                        <span class="text-[10px] uppercase tracking-widest text-sky-600 font-bold">Cleaning Pros</span>
                    </div>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="index.html" class="nav-link text-sm font-semibold text-slate-600">Home</a>
                    <a href="about.html" class="nav-link text-sm font-semibold text-slate-600">About</a>
                    <a href="services.html" class="nav-link text-sm font-semibold text-slate-600">Services</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-20 lg:py-32">
        <div class="max-w-4xl mx-auto px-4">
            <div class="text-center mb-16">
                <h1 class="text-4xl lg:text-6xl font-black text-slate-900 mb-6">Get Your <span class="text-sky-600">Quote.</span></h1>
                <p class="text-lg text-slate-600">Email us at <span class="font-bold">info@bluenosecleaningpros.com</span> or fill out the form below.</p>
            </div>

            <div class="bg-white p-8 lg:p-12 rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100">
                <form action="https://formspree.io/f/xaqllpll" method="POST" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Name</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Your Email Address</label>
                            <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none" placeholder="example@gmail.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Service Needed</label>
                        <select name="service" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200">
                            <option>Residential Cleaning</option>
                            <option>Commercial/Office</option>
                            <option>Move-In / Move-Out</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Message</label>
                        <textarea name="message" rows="4" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold text-lg hover:bg-sky-700 transition-all">Send Request</button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
